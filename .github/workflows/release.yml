name: Release

on:
  push:
    tags:
      - 'v*' # 例: v1.0.0 などのタグがプッシュされた時に実行されます

jobs:
  build_and_release:
    name: Build and Release
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App
        run: |
          xcodebuild -project InputSourceHandler.xcodeproj \
            -scheme InputSourceHandler \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$PWD/build \
            clean build

      - name: Zip App
        run: |
          cd build/Release
          # アプリケーションフォルダをZip圧縮します
          zip -ry ../../InputSourceHandler.zip InputSourceHandler.app

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true # trueにすると下書き（ドラフト）として作成され、手動で公開ボタンを押すまで公開されません
          files: InputSourceHandler.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
